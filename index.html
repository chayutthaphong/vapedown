<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Step Down">
    <meta name="theme-color" content="#fafafa">
    <title>Step Down - Clinical Protocol</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #fafafa; -webkit-user-select: none; user-select: none; padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 4px; }
        textarea { -webkit-user-select: text; user-select: text; }
        .mood-btn {
            filter: grayscale(100%); opacity: 0.5;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid transparent; padding: 8px; border-radius: 16px;
        }
        .mood-btn:hover { opacity: 0.8; transform: scale(1.05); }
        .mood-btn.active {
            transform: scale(1.15); filter: grayscale(0%); opacity: 1;
            background-color: #f3f4f6; border-color: #111827;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .step-dot { width: 8px; height: 8px; border-radius: 50%; background: #d1d5db; transition: all 0.2s; }
        .step-dot.active { background: #111827; width: 20px; border-radius: 4px; }
    </style>
</head>
<body class="flex flex-col items-center justify-start min-h-screen p-4 sm:p-6 text-gray-900 antialiased relative">

    <div class="w-full max-w-md bg-white rounded-3xl shadow-sm border border-gray-100 p-6 space-y-6 my-4">

        <div class="text-center">
            <h1 class="text-3xl font-extralight tracking-tight text-gray-900">Step Down</h1>
            <div class="inline-block mt-2 px-3 py-1 bg-gray-100 rounded-full">
                <p class="text-xs text-gray-600 font-medium tracking-wider uppercase" id="weekDisplay">Loading...</p>
            </div>
            <p id="liveClock" class="text-xs text-gray-400 mt-3 font-medium tracking-wide"></p>
        </div>

        <div class="grid grid-cols-2 gap-3">
            <div class="bg-gray-50 p-3 rounded-2xl border border-gray-100">
                <p class="text-[10px] uppercase tracking-wider text-gray-400 font-medium">Dependence (FTND)</p>
                <div class="flex items-baseline gap-2 mt-0.5">
                    <p class="text-sm font-medium text-gray-700" id="dependenceLabel">&mdash;</p>
                    <p class="text-xs text-gray-400" id="ftndScoreDisplay"></p>
                </div>
            </div>
            <div class="bg-gray-50 p-3 rounded-2xl border border-gray-100">
                <p class="text-[10px] uppercase tracking-wider text-gray-400 font-medium">E-cig Dep. (PS-ECDI)</p>
                <div class="flex items-baseline gap-2 mt-0.5">
                    <p class="text-sm font-medium text-gray-700" id="ecdiLabel">&mdash;</p>
                    <p class="text-xs text-gray-400" id="ecdiScoreDisplay"></p>
                </div>
            </div>
        </div>

        <div class="text-center bg-gray-50/50 border border-gray-100 rounded-2xl py-6 relative mt-2">
            <p class="text-xs text-gray-400 uppercase tracking-widest mb-1 font-medium">Today's Puffs</p>
            <div class="flex items-baseline justify-center gap-1">
                <span id="currentPuffs" class="text-6xl font-extralight tracking-tighter text-gray-900">0</span>
                <span class="text-xl text-gray-300 font-light">/</span>
                <span id="dailyTargetDisplay" class="text-xl text-gray-400 font-light">-</span>
            </div>
            <p id="motivationMsg" class="text-xs text-gray-500 mt-3 px-4 font-medium min-h-[1rem]">
                Ready to track.
            </p>
        </div>

        <button id="logBtn" class="w-full bg-gray-900 text-white py-4 rounded-2xl text-md font-medium tracking-wide shadow-sm hover:bg-gray-800 active:scale-[0.98] transition duration-150 ease-in-out">
            Log 1 Puff
        </button>
        <button id="undoBtn" class="w-full -mt-3 text-gray-400 py-2 text-xs font-medium hover:text-gray-600 transition">
            &#8634; Undo last puff
        </button>

        <div class="pt-2">
            <p class="text-[10px] uppercase tracking-wider text-gray-400 mb-3 font-medium text-center">Longitudinal Tracking (7-Day)</p>
            <div class="h-40 w-full">
                <canvas id="analyticsChart"></canvas>
            </div>
            <button onclick="openMonthly()" class="w-full mt-3 text-[11px] text-gray-400 hover:text-gray-600 font-medium transition">View 28-day monthly review &rarr;</button>
        </div>

        <script>
            // ... (โค้ด JS ส่วนที่เหลือของคุณ)
            // หัวใจสำคัญคือการแก้ฟังก์ชัน initApp แบบนี้ครับ:

            function initApp() {
                let data = getStorage();
                
                // --- FIX: เพิ่ม Safety Valve ตรงนี้ ---
                if (!data.startDate || data.startDate === "NaN" || data.startDate === null) {
                    data.startDate = todayStr;
                    saveStorage(data);
                }
                // ------------------------------------

                fetchFromSheets().then(function(){
                    renderFromState();
                });
            }
            // ... (ส่วนที่เหลือของ JS เดิม)
        </script>
    </div>
</body>
</html>
