<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step Down - Clinical Protocol</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #fafafa; }
        .modal { display: none; }
        .modal.active { display: flex; }
    </style>
</head>
<body class="flex flex-col items-center justify-start min-h-screen p-4 text-gray-900">

    <div class="w-full max-w-md bg-white rounded-3xl shadow-sm border border-gray-100 p-6 space-y-6">
        <div class="text-center">
            <h1 class="text-3xl font-extralight">Step Down</h1>
            <p id="weekDisplay" class="text-xs text-gray-400 uppercase tracking-widest mt-2">Loading...</p>
        </div>

        <div class="text-center bg-gray-50 py-6 rounded-2xl">
            <p class="text-xs text-gray-400 uppercase">Today's Puffs</p>
            <h2 id="currentPuffs" class="text-6xl font-extralight mt-2">0</h2>
            <p id="motivationMsg" class="text-xs text-gray-500 mt-4 px-4"></p>
        </div>

        <button id="logBtn" class="w-full bg-gray-900 text-white py-4 rounded-2xl font-medium shadow-sm hover:bg-gray-800 transition">Log 1 Puff</button>
        
        <div class="h-40 w-full">
            <canvas id="analyticsChart"></canvas>
        </div>
    </div>

    <div id="assessmentModal" class="fixed inset-0 bg-gray-900/90 backdrop-blur-sm z-[100] hidden items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-3xl p-6 text-center space-y-4">
            <h2 class="text-xl font-medium">Weekly Assessment</h2>
            <p class="text-sm text-gray-500">Choose your preferred clinical protocol for this week:</p>
            <button onclick="showProtocol('FTND')" class="w-full bg-blue-600 text-white py-3 rounded-xl">FTND-V (Standard)</button>
            <button onclick="showProtocol('ECDI')" class="w-full bg-emerald-600 text-white py-3 rounded-xl">ECDI (Penn State)</button>
        </div>
    </div>

    <script>
        // --- CONFIG ---
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzEsQ8_glo3ARMLLkSYSLmRJD3bB_w-RO3TrMzP7f9Howhy_BvHGOK6u0WpssTqdSpwsw/exec"; 
        let currentTarget = 0, currentWeek = 1, currentScore = 0;
        const todayStr = new Date().toLocaleDateString('en-CA');

        function getStorage() {
            return JSON.parse(localStorage.getItem('vape_tracker_v6') || '{"startDate":null, "history":{}, "ftndHistory":{}}');
        }

        function saveStorage(data) { localStorage.setItem('vape_tracker_v6', JSON.stringify(data)); }

        function initApp() {
            let data = getStorage();
            if (!data.startDate) { data.startDate = todayStr; saveStorage(data); }

            const start = new Date(data.startDate + "T00:00:00");
            const now = new Date(todayStr + "T00:00:00");
            currentWeek = Math.floor(Math.max(0, (now - start) / (1000 * 60 * 60 * 24)) / 7) + 1;
            document.getElementById('weekDisplay').innerText = `Week ${currentWeek} / 8`;

            // ตรวจสอบว่าสัปดาห์นี้ทำไปหรือยัง
            if (!data.ftndHistory[currentWeek]) {
                document.getElementById('assessmentModal').classList.add('flex');
            } else {
                currentScore = data.ftndHistory[currentWeek].score;
                calculateTarget();
                updateUI();
            }
        }

        function calculateTarget() {
            // คำนวณตามสัปดาห์ (Tapering)
            let base = 20; 
            const rates = [1.0, 0.9, 0.7, 0.5, 0.3, 0.2, 0.1, 0.05];
            currentTarget = Math.ceil(base * rates[currentWeek - 1]);
        }

        function updateUI() {
            const data = getStorage();
            document.getElementById('currentPuffs').innerText = data.history[todayStr] || 0;
        }

        document.getElementById('logBtn').addEventListener('click', () => {
            let data = getStorage();
            data.history[todayStr] = (data.history[todayStr] || 0) + 1;
            saveStorage(data);
            updateUI();
        });

        // เปิด protocol ตามที่เลือก
        function showProtocol(type) {
            alert(`Opening ${type} Protocol... (Implement questions here)`);
            finalizeAssessment(5, type); // Test score
        }

        function finalizeAssessment(score, type) {
            let data = getStorage();
            data.ftndHistory[currentWeek] = { score: score, type: type };
            saveStorage(data);
            document.getElementById('assessmentModal').classList.remove('flex');
            calculateTarget();
            updateUI();
        }

        initApp();
    </script>
</body>
</html>
